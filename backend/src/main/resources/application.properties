# ==========================================
# TrainEasy - Configuração do Banco de Dados
# ==========================================

spring.application.name=TrainEasy API

# MySQL - variáveis de ambiente (Railway) com fallback local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/traineasy}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:TrainEasy123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Porta do servidor - Railway injeta PORT automaticamente
server.port=${PORT:8080}
