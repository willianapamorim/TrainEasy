# ==========================================
# TrainEasy - Configuração do Banco de Dados
# ==========================================

spring.application.name=TrainEasy API
spring.application.version=1.1.0

# MySQL - Railway injeta MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Usa variáveis do Railway com fallback local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:traineasy}}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Porta do servidor - Railway injeta PORT automaticamente
server.port=${PORT:8080}

# ==========================================
# Configuração de E-mail (Resend HTTP API)
# ==========================================
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:TrainEasy <noreply@traineasy.com.br>}

# ==========================================
# Cloudinary (Armazenamento de Vídeos)
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
